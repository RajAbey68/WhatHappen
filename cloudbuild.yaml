steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/whathappen/app:$COMMIT_SHA'
      - '--build-arg'
      - 'NEXT_PUBLIC_SUPABASE_URL=https://pomgvxdokjmxyfbgazls.supabase.co'
      - '--build-arg'
      - 'NEXT_PUBLIC_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBvbWd2eGRva2pteHlmYmdhemxzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwNjU1OTAsImV4cCI6MjA5NjY0MTU5MH0.jnpG78rmOH1Dint18ForByuzH5y9rdBH9wX4kGs_slI'
      - '--build-arg'
      - 'NEXT_PUBLIC_APP_URL=https://whathappen-116263110764.europe-west1.run.app'
      - '.'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/whathappen/app:$COMMIT_SHA'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - whathappen
      - '--image=europe-west1-docker.pkg.dev/$PROJECT_ID/whathappen/app:$COMMIT_SHA'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--max-instances=10'
      - '--min-instances=0'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--timeout=60'
      - '--allow-unauthenticated'
      - '--set-secrets=DEEPSEEK_API_KEY=deepseek-api-key:latest'
      - '--set-secrets=SUPABASE_SERVICE_ROLE_KEY=supabase-service-key:latest'
      - '--set-secrets=GCS_BUCKET=gcs-bucket-name:latest'
      - '--set-env-vars=NEXT_PUBLIC_SUPABASE_URL=https://pomgvxdokjmxyfbgazls.supabase.co'
      - '--set-env-vars=NEXT_PUBLIC_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBvbWd2eGRva2pteHlmYmdhemxzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwNjU1OTAsImV4cCI6MjA5NjY0MTU5MH0.jnpG78rmOH1Dint18ForByuzH5y9rdBH9wX4kGs_slI'
      - '--set-env-vars=NEXT_PUBLIC_APP_URL=https://whathappen-116263110764.europe-west1.run.app'

images:
  - 'europe-west1-docker.pkg.dev/$PROJECT_ID/whathappen/app:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
